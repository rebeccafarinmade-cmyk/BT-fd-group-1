<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Chelo Event Management System</title>
</head>
<body>
    <header>
        <!-- NAVIGATION -->
        <nav>
            <a href="">Home</a>
            <a href="">Events</a>
            <a href="">Contacts</a>
        </nav>
        <!-- HERO SECTION -->
        <h1>Event Management Dashboard</h1>
        <p>Manage your events with ease!</p>
    </header>
    <main>
        <!-- FEATURES SECTION -->
         <form action="" method="post">
            <h2>Create New Event</h2>
            <label for="name">Event Name</label>
            <input id="name" type="text" name="event-name" placeholder="Event Name">
            <label for="date">Date</label>
            <input id="date" type="text" name="event-date" placeholder="July 15 2026">
            <label for="location">location</label>
            <input id="location" type="text" name="event-location" placeholder="Location">
            <label for="description">Description</label>
            <input id="description" type="text" name="event-description">
            <button type="submit">+ Add Event</button>
         </form>
    </main>
</body>
</html>
