<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Chelo Event Management System</title>
</head>
<body>
    <!-- NAVIGATION -->
     <nav class="navi">
      <a href="">Home</a>
      <a href="">Events</a>
      <a href="">Contacts</a>
     </nav>
     <div class="container">
        <header>    
            <!-- HERO SECTION -->
            <h1>Event Management Dashboard</h1>
            <p>Manage your events with ease!</p>
        </header>
        <main>
            <!-- FEATURES SECTION -->
             <div class="form-input">
              <form action="" method="post">
                <h2>Create New Event</h2>
                <label for="name">Event Name</label>
                <input id="name" type="text" name="event-name" placeholder="Event Name">
                <label for="date">Date</label>
                <select name="event-day" id="date">
                  <option value="15">15</option>
                  <option value="16">16</option>
                  <option value="17">17</option>
                  <option value="18">18</option>
                  <option value="19">19</option>
                  <option value="20">20</option>
                </select>
                <select name="event-month" id="month">
                  <option value="1">January</option>
                  <option value="2">Febuary</option>
                  <option value="3">March</option>
                  <option value="4">April</option>
                  <option value="5">May</option>
                  <option value="6">June</option>
                  <option value="7">July</option>
                  <option value="8">August</option>
                  <option value="9">September</option>
                  <option value="10">October</option>
                  <option value="11">November</option>
                  <option value="12">December</option>
                </select>
                <select name="event-year" id="year">
                  <option value="1">2026</option>
                  <option value="2">2027</option>
                </select>
                <label for="location">location</label>
                <input id="location" type="text" name="event-location" placeholder="Location">
                <label for="description">Description</label>
                <input id="description" type="text" name="event-description">
                <button type="submit">+ Add Event</button>
              </form>
             </div>
             <!-- CTA SECTION -->
              <h2>Upcoming Events</h2>
              <div>
                <h3>Marketing Workshop</h3>
                <p>July 15, 2026</p>
                <p>Lagos State, Nigeria</p>
                <select name="event-status" id="event-status">
                  <option value="Active">Active</option>
                  <option value="Planning">Planning</option>
                </select>
                <div>
                  <button onclick="editEvent(0)">Edit</button>
                  <button onclick="deleteEvent(0)">Delete</button>
                </div>
              </div>
              <button id="view-all-btn">View All Events></button>
        </main>
     </div>
</body>
</html>
